; PlatformIO project — BLDC driver (STM32F103C8T6)
; Framework: STM32Cube (sterowniki LL), bez Arduino.

[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = stm32cube

; Programator / debugger (zmień jeśli używasz innego)
upload_protocol = stlink
debug_tool = stlink

; Logi przez UART (USART3, 115200)
monitor_speed = 115200

build_flags =
    -DUSE_FULL_LL_DRIVER
    ; Brak kwarcu na płytce — taktowanie z wewnętrznego HSI (8 MHz).
    ; HSE_VALUE pozostaje tylko dla zgodności nagłówków HAL (nieużywane).
    -DHSE_VALUE=8000000U
    -Iinclude
    -Os
    -Wall
    -Wextra
